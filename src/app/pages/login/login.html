<div class="login-container">
  <mat-card class="login-card" appearance="outlined">
    <mat-card-header>
      <mat-icon class="header-icon" color="primary">lock</mat-icon>
      <mat-card-title>Login</mat-card-title>
      <mat-card-subtitle>Silakan masuk ke akun Anda</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="fill" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" type="email" placeholder="user@test.com" />
          <mat-icon matSuffix>email</mat-icon>
          <mat-error *ngIf="form.get('email')?.hasError('required')">Email wajib diisi</mat-error>
          <mat-error *ngIf="form.get('email')?.hasError('email')">Format email tidak valid</mat-error>
        </mat-form-field>

        <mat-form-field appearance="fill" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput formControlName="password" [type]="hidePassword ? 'password' : 'text'" placeholder="password123" />
          <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="form.get('password')?.hasError('required')">Password wajib diisi</mat-error>
        </mat-form-field>

        <mat-error *ngIf="error" class="login-error">{{ error }}</mat-error>

        <button mat-flat-button color="primary" type="submit" class="full-width submit-btn" [disabled]="loading">
          <mat-spinner *ngIf="loading" diameter="20" class="btn-spinner"></mat-spinner>
          <span *ngIf="!loading">Masuk</span>
          <span *ngIf="loading">Memproses...</span>
        </button>
      </form>
    </mat-card-content>

    <mat-card-footer>
      <div class="test-credentials">
        <p>User: <strong>user@test.com</strong></p>
        <p>Admin: <strong>admin@test.com</strong></p>
        <p>Password: <strong>password123</strong></p>
      </div>
    </mat-card-footer>
  </mat-card>
</div>
