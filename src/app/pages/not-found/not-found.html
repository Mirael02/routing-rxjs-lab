<div class="not-found-container">
  <mat-card class="not-found-card" appearance="outlined">
    <mat-icon class="not-found-icon" color="primary">error_outline</mat-icon>
    <mat-card-title>404</mat-card-title>
    <mat-card-subtitle>Halaman Tidak Ditemukan</mat-card-subtitle>
    <mat-card-content>
      <p>Halaman yang Anda cari tidak ada atau telah dipindahkan.</p>
    </mat-card-content>
    <mat-card-actions>
      <a mat-raised-button color="primary" routerLink="/home">
        <mat-icon>home</mat-icon>
        Kembali ke Beranda
      </a>
    </mat-card-actions>
  </mat-card>
</div>
