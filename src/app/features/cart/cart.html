<div class="cart-container">
  <h1>
    Keranjang Belanja
    <span class="item-count" *ngIf="(cartService.itemCount$ | async) as count">
      ({{ count }} item)
    </span>
  </h1>

  <ng-container *ngIf="!(cartService.isEmpty$ | async); else empty">
    <div class="cart-items">
      <mat-card *ngFor="let item of cartService.cart$ | async" class="cart-item" appearance="outlined">
        <img [src]="item.thumbnail" [alt]="item.title" class="item-image" />

        <div class="item-details">
          <h3>{{ item.title }}</h3>
          <p class="item-price">{{ item.price | currency:'USD' }}</p>
        </div>

        <div class="quantity-controls">
          <button mat-icon-button (click)="updateQty(item.id, item.quantity - 1)">
            <mat-icon>remove</mat-icon>
          </button>
          <span class="qty-value">{{ item.quantity }}</span>
          <button mat-icon-button (click)="updateQty(item.id, item.quantity + 1)">
            <mat-icon>add</mat-icon>
          </button>
        </div>

        <div class="item-subtotal">
          {{ item.price * item.quantity | currency:'USD' }}
        </div>

        <button mat-icon-button color="warn" (click)="removeItem(item.id)" class="remove-btn">
          <mat-icon>delete</mat-icon>
        </button>
      </mat-card>
    </div>

    <mat-divider class="cart-divider"></mat-divider>

    <div class="cart-summary">
      <div class="summary-row">
        <span>Subtotal</span>
        <span class="total-value">{{ cartService.subtotal$ | async | currency:'USD' }}</span>
      </div>

      <div class="summary-actions">
        <button mat-stroked-button (click)="cartService.clearCart()">
          <mat-icon>delete_sweep</mat-icon>
          Kosongkan Keranjang
        </button>

        <button mat-flat-button color="primary" (click)="checkout()" [disabled]="isCheckingOut">
          <mat-spinner *ngIf="isCheckingOut" diameter="20" class="btn-spinner"></mat-spinner>
          <mat-icon *ngIf="!isCheckingOut">payment</mat-icon>
          {{ isCheckingOut ? 'Memproses...' : 'Bayar Sekarang' }}
        </button>
      </div>
    </div>
  </ng-container>

  <ng-template #empty>
    <div class="empty-cart">
      <mat-icon>remove_shopping_cart</mat-icon>
      <p>Keranjang Anda kosong</p>
      <a mat-raised-button color="primary" routerLink="/products">
        <mat-icon>shopping_bag</mat-icon>
        Mulai Belanja
      </a>
    </div>
  </ng-template>
</div>
