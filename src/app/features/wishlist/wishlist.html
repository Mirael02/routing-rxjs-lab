<div style="padding: 20px; max-width: 1200px; margin: auto;">
  <h2>Wishlist Saya</h2>

  <ng-container *ngIf="wishlist$ | async as items">
    
    <div *ngIf="items.length === 0" style="text-align: center; padding: 50px;">
      <p>Kamu belum menambahkan produk apapun ke wishlist.</p>
      <a routerLink="/products" style="padding: 10px 20px; background-color: #007bff; color: white; text-decoration: none; border-radius: 4px;">Lihat Produk</a>
    </div>

    <div *ngIf="items.length > 0" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px;">
      <div *ngFor="let item of items" style="border: 1px solid #ddd; padding: 15px; border-radius: 8px;">
        <img [src]="item.thumbnail" [alt]="item.title" style="width: 100%; height: 150px; object-fit: cover;">
        
        <h3 style="margin: 10px 0;">{{ item.title }}</h3>
        <p style="font-weight: bold;">{{ item.price * 15500 | currency:'IDR':'symbol':'1.0-0' }}</p>
        
        <div style="display: flex; gap: 10px; margin-top: 15px;">
          <button [routerLink]="['/products', item.id]" style="flex: 1; padding: 8px; cursor: pointer;">
            Lihat Detail
          </button>
          <button (click)="removeFromWishlist(item)" style="flex: 1; padding: 8px; cursor: pointer; color: red; border-color: red;">
            Hapus
          </button>
        </div>
      </div>
    </div>

  </ng-container>
</div>
