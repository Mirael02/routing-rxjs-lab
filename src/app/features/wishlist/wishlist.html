<div class="wishlist-container">
  <h1>Wishlist Saya</h1>

  <ng-container *ngIf="wishlist$ | async as items">
    <div class="empty-wishlist" *ngIf="items.length === 0">
      <mat-icon>favorite_border</mat-icon>
      <p>Kamu belum menambahkan produk apapun ke wishlist.</p>
      <a mat-raised-button color="primary" routerLink="/products">
        <mat-icon>shopping_bag</mat-icon>
        Lihat Produk
      </a>
    </div>

    <div class="wishlist-grid" *ngIf="items.length > 0">
      <mat-card *ngFor="let item of items" class="wishlist-card" appearance="outlined">
        <img mat-card-image [src]="item.thumbnail" [alt]="item.title" />

        <mat-card-content>
          <mat-card-title>{{ item.title }}</mat-card-title>
          <p class="wishlist-price">{{ item.price * 15500 | currency:'IDR':'symbol':'1.0-0' }}</p>
        </mat-card-content>

        <mat-card-actions>
          <button mat-button color="primary" [routerLink]="['/products', item.id]">
            <mat-icon>visibility</mat-icon>
            Lihat Detail
          </button>
          <button mat-button color="warn" (click)="removeFromWishlist(item)">
            <mat-icon>delete</mat-icon>
            Hapus
          </button>
        </mat-card-actions>
      </mat-card>
    </div>
  </ng-container>
</div>
