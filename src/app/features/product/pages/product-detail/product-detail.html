<div class="detail-container" *ngIf="data$ | async as data; else loading">
  <mat-card class="product-main" appearance="outlined">
    <div class="product-layout">
      <div class="product-image">
        <img [src]="data.thumbnail" [alt]="data.title" />
      </div>

      <div class="product-info">
        <mat-chip-set>
          <mat-chip>{{ data.category }}</mat-chip>
          <mat-chip [color]="data.stock > 0 ? 'primary' : 'warn'" highlighted>
            {{ data.stock > 0 ? 'Stok: ' + data.stock : 'Habis' }}
          </mat-chip>
        </mat-chip-set>

        <h1>{{ data.title }}</h1>
        <p class="price">{{ data.price | currency:'USD' }}</p>
        <p class="description">{{ data.description }}</p>

        <div class="actions">
          <button mat-flat-button color="primary" (click)="addToCart(data)">
            <mat-icon>add_shopping_cart</mat-icon>
            Tambah ke Keranjang
          </button>

          <button mat-stroked-button (click)="toggleWishlist(data)"
                  [color]="(isFavorite$ | async) ? 'warn' : ''">
            <mat-icon>{{ (isFavorite$ | async) ? 'favorite' : 'favorite_border' }}</mat-icon>
            {{ (isFavorite$ | async) ? 'Hapus dari Wishlist' : 'Tambah ke Wishlist' }}
          </button>
        </div>
      </div>
    </div>
  </mat-card>

  <mat-divider class="section-divider"></mat-divider>

  <section class="related-section">
    <h2>Produk Terkait</h2>
    <div class="related-grid">
      <mat-card *ngFor="let p of data.related" class="related-card" appearance="outlined"
                [routerLink]="['/products', p.id]">
        <img mat-card-image [src]="p.thumbnail" [alt]="p.title" />
        <mat-card-content>
          <mat-card-title>{{ p.title }}</mat-card-title>
        </mat-card-content>
      </mat-card>
    </div>
  </section>
</div>

<ng-template #loading>
  <div class="loading-state">
    <mat-spinner diameter="48"></mat-spinner>
    <p>Memuat data produk...</p>
  </div>
</ng-template>
