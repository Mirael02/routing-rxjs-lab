<div class="product-list-container">
  <div class="filters-bar">
    <mat-form-field appearance="fill" class="search-field">
      <mat-icon matPrefix>search</mat-icon>
      <input matInput [formControl]="searchControl" placeholder="Cari produk..." />
    </mat-form-field>

    <mat-form-field appearance="fill" class="category-field">
      <mat-label>Kategori</mat-label>
      <mat-select [formControl]="categoryControl">
        <mat-option value="">Semua Kategori</mat-option>
        <mat-option *ngFor="let cat of categories$ | async" [value]="cat">{{ cat }}</mat-option>
      </mat-select>
    </mat-form-field>
  </div>

  <div class="loading-indicator" *ngIf="isLoading">
    <mat-spinner diameter="40"></mat-spinner>
    <span>Mencari produk...</span>
  </div>

  <div class="product-grid" *ngIf="!isLoading">
    <mat-card *ngFor="let product of products$ | async" class="product-card" appearance="outlined"
              [routerLink]="['/products', product.id]">
      <img mat-card-image [src]="product.thumbnail" [alt]="product.title" />
      <mat-card-content>
        <mat-card-title>{{ product.title }}</mat-card-title>
        <mat-card-subtitle>{{ product.category }}</mat-card-subtitle>
        <p class="price">{{ product.price | currency:'USD' }}</p>
      </mat-card-content>
    </mat-card>
  </div>

  <div class="empty-state" *ngIf="!isLoading && (products$ | async)?.length === 0">
    <mat-icon>search_off</mat-icon>
    <p>Tidak ada produk yang ditemukan.</p>
  </div>
</div>
