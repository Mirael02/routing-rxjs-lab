<nav class="navbar">
  <a routerLink="/home" class="brand">ShopApp</a>
  
  <div class="nav-links">
    <a routerLink="/products" routerLinkActive="active">Produk</a>
    
    <a routerLink="/cart" class="cart-link">
      Keranjang
      <span class="badge" *ngIf="(navStats$ | async) as stats">
        {{ stats.cart }}
      </span>
    </a>

    <a routerLink="/wishlist" class="wishlist-link">
      Wishlist
      <span class="badge" *ngIf="(navStats$ | async) as stats">
        {{ stats.wishlist }}
      </span>
    </a>

    <a *ngIf="(isLoggedIn$ | async); else loginLink" (click)="logout()" class="logout" style="cursor: pointer;">
      Keluar
    </a>
    
    <ng-template #loginLink>
      <a routerLink="/login">Masuk</a>
    </ng-template>
  </div>
</nav>
